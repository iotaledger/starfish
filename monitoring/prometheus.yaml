global:
  scrape_interval: 1s
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']
  - job_name: 'consensus-metrics'
    honor_labels: true
    static_configs:
      - targets: ['host.docker.internal:1510']
        labels:
          node: 'node-0'
      - targets: ['host.docker.internal:1511']
        labels:
          node: 'node-1'
      - targets: ['host.docker.internal:1512']
        labels:
          node: 'node-2'
      - targets: ['host.docker.internal:1513']
        labels:
          node: 'node-3'
      - targets: ['host.docker.internal:1514']
        labels:
          node: 'node-4'
      - targets: ['host.docker.internal:1515']
        labels:
          node: 'node-5'
      - targets: ['host.docker.internal:1516']
        labels:
          node: 'node-6'
      - targets: ['host.docker.internal:1517']
        labels:
          node: 'node-7'
      - targets: ['host.docker.internal:1518']
        labels:
          node: 'node-8'
      - targets: ['host.docker.internal:1519']
        labels:
          node: 'node-9'
